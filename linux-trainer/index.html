.sn a{color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .15s}
.sn a:hover{color:var(--green)}
.sn span{color:var(--text3);font-size:10px}
#T{flex:1;padding:10px 12px;overflow-y:auto;font-size:13px;line-height:1.55;-webkit-overflow-scrolling:touch;word-wrap:break-word}

#T::-webkit-scrollbar-track{background:var(--bg)}
#T::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--blue)}.y{color:var(--yellow)}.p{color:var(--purple)}.o{color:var(--orange)}
.d{color:var(--text2)}.dd{color:var(--text3)}.w{color:var(--white)}
.bld{font-weight:500}
.echo{color:var(--text3)}
#qk{display:flex;background:var(--bg2);padding:5px 3px;overflow-x:auto;border-top:1px solid var(--border);flex-shrink:0;gap:3px}
.qk{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:4px;font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0;user-select:none;-webkit-user-select:none}
.qk:active{background:var(--border);transform:translateY(1px)}
.pr{display:flex;padding:8px 12px;background:var(--bg2);border-top:1px solid var(--border);align-items:center;flex-shrink:0}
.pr label{color:var(--green);margin-right:6px;font-weight:500;flex-shrink:0;font-size:13px}
.pr input{flex:1;background:transparent;border:none;color:var(--white);font-family:var(--mono);font-size:15px;outline:none;min-width:0}
@media(max-width:480px){body{font-size:12px}.pr input{font-size:14px}.qk{padding:5px 8px;font-size:11px}}

function simShell(cmd){
  // Handle empty/whitespace-only input
  if(!cmd||!cmd.trim()) return '';
  
  // Handle standalone special characters and shell operators
  if(cmd==='/') return '/: this is a path separator, not a command. Try: ls /';
  if(cmd==='|') return '|: pipe operator - connects command output to input. Try: ls | grep pattern';
  if(cmd==='>') return '>: redirect output to file (overwrite). Try: echo hello > file.txt';
  if(cmd==='>>') return '>>: redirect output to file (append). Try: echo hello >> file.txt';
  if(cmd==='2>') return '2>: redirect stderr. Try: command 2> errors.txt';
  if(cmd==='$') return '$: shell variable prefix. Try: echo $USER or echo $HOME';
  if(cmd==='~') return '/home/user (your home directory)';
  if(cmd==='-') return '-: previous directory. Try: cd - to go back';
  if(cmd==='Ctrl+') return 'Ctrl+: keyboard shortcut prefix. Try: Ctrl+C (interrupt), Ctrl+Z (suspend)';
  
  if(SH[cmd]!==undefined) return SH[cmd];
  
  // Dynamic patterns
  if(cmd==='clear'){T.innerHTML='';return null;}
  if(cmd.startsWith('echo ')) return cmd.slice(5).replace(/^["']|["']$/g,'');
  if(cmd.startsWith('cd ')||cmd==='cd') return '';
  if(cmd.startsWith('man ')) return `Manual page for ${cmd.slice(4)} — press q to exit in a real terminal.`;
  if(cmd.startsWith('which ')) return `/usr/bin/${cmd.slice(6)}`;
  if(cmd.startsWith('type ')){const c=cmd.slice(5);return `${c} is /usr/bin/${c}`;}
  if(cmd.startsWith('whatis ')) return `${cmd.slice(7)} (1) - ${cmd.slice(7)} command`;
  if(cmd.startsWith('file ')) return `${cmd.slice(5)}: ASCII text`;
  if(cmd.startsWith('apropos ')) return `${cmd.slice(8)} (1) - description of ${cmd.slice(8)} related commands`;
  if(cmd.startsWith('info ')) return `Info document for ${cmd.slice(5)} — press q to exit`;
  if(cmd.startsWith('help ')) return `${cmd.slice(5)}: ${cmd.slice(5)} is a shell builtin`;
  if(cmd.startsWith('mkdir ')||cmd.startsWith('touch ')||cmd.startsWith('rm ')||cmd.startsWith('rmdir ')||cmd.startsWith('cp ')||cmd.startsWith('mv ')||cmd.startsWith('ln ')) return '';
  if(cmd.startsWith('cat ')||cmd.startsWith('less ')||cmd.startsWith('more ')) return `(contents of ${cmd.split(' ').pop()})`;
  if(cmd.startsWith('head ')){ return `(first 10 lines of ${cmd.split(' ').pop()})`;}
  if(cmd.startsWith('tail ')){ return `(last 10 lines of ${cmd.split(' ').pop()})`;}
  if(cmd.startsWith('wc ')) return ` 42  88 2574 ${cmd.split(' ').pop()}`;
  if(cmd.startsWith('sort ')||cmd==='sort') return '(sorted output)';
  if(cmd.startsWith('uniq')||cmd==='uniq') return '(unique lines)';
  if(cmd.startsWith('cut ')) return '(cut fields)';
  if(cmd.startsWith('tr ')) return '(translated text)';
  if(cmd.startsWith('sed ')) return '(transformed text)';
  if(cmd.startsWith('grep ')){const parts=cmd.split(' ');return `(matches for "${parts[1]}" in ${parts.slice(2).join(' ')||'stdin'})`;}
  if(cmd.startsWith('find ')){return '(found files...)';}
  if(cmd.startsWith('locate ')) return `(files matching ${cmd.slice(7)})`;
  if(cmd.startsWith('ping ')){return `PING ${cmd.split(' ')[1]} (93.184.216.34): 56 bytes\n64 bytes: icmp_seq=1 ttl=56 time=11.4 ms`;}
  if(cmd.startsWith('ssh ')){return `Connecting to ${cmd.split(' ').pop()}...`;}
  if(cmd.startsWith('scp ')) return '(copying...)';
  if(cmd.startsWith('wget ')||cmd.startsWith('curl ')) return `Downloading ${cmd.split(' ').pop()}...`;
  if(cmd.startsWith('chmod ')||cmd.startsWith('chown ')||cmd.startsWith('chgrp ')) return '';
  if(cmd.startsWith('tar ')) return '(archive operation)';
  if(cmd.startsWith('gzip ')||cmd.startsWith('gunzip ')||cmd.startsWith('bzip2 ')) return '';
  if(cmd.startsWith('zip ')||cmd.startsWith('unzip ')) return '';
  if(cmd.startsWith('rsync ')) return '(syncing...)';
  if(cmd.startsWith('kill ')||cmd.startsWith('killall ')) return '';
  if(cmd==='sudo'||cmd==='sudo -i'||cmd==='sudo i'||cmd==='sudo su'||cmd==='su -'||cmd==='su'){return 'root@linux-workstation:/home/user#\n(simulated root shell — type exit to return)';}
  if(cmd==='sudo -l'){return 'User user may run the following commands:\n    (ALL : ALL) ALL';}
  if(cmd.startsWith('sudo ')){const inner=simShell(cmd.slice(5));if(inner===undefined)return `sudo: ${cmd.slice(5).split(' ')[0]}: command not found`;return inner;}
  if(cmd.startsWith('alias ')) return '';
  if(cmd.startsWith('unalias ')) return '';
  if(cmd.startsWith('export ')) return '';
  if(cmd.startsWith('source ')||cmd.startsWith('. ')) return '';
  if(cmd==='top'||cmd==='htop') return 'PID USER      PR  NI    VIRT    RES  %CPU COMMAND\n  1 root      20   0  169344  11680   0.0 systemd\n(press q to exit in real terminal)';
  if(cmd.startsWith('vi ')||cmd.startsWith('vim ')||cmd.startsWith('nano ')) return `(opening ${cmd.split(' ').pop()} in editor)`;
  if(cmd.startsWith('systemctl ')) return `(service operation: ${cmd})`;
  if(cmd.startsWith('journalctl')) return '(journal log output)';
  if(cmd.startsWith('useradd ')||cmd.startsWith('userdel ')||cmd.startsWith('adduser ')||cmd.startsWith('passwd ')) return '';
  if(cmd.startsWith('apt-get ')||cmd.startsWith('apt ')||cmd.startsWith('yum ')||cmd.startsWith('dnf ')||cmd.startsWith('pacman ')) return '(package manager operation)';
  // Bare commands & dev tools
  if(cmd==='apt'||cmd==='apt-get') return 'Usage: apt [options] command\n\nMost used commands:\n  list - list packages\n  search - search package descriptions\n  install - install packages\n  update - update list of available packages\n  upgrade - upgrade the system';
  if(cmd==='npm') return 'Usage: npm <command>\n\nCommon commands:\n  npm init          create a package.json\n  npm install       install all dependencies\n  npm install <pkg> add a package\n  npm start         run the start script\n  npm test          run tests\n  npm run <script>  run a named script';
  if(cmd.startsWith('npm ')) return `npm: simulated — ${cmd}`;
  if(cmd==='pip'||cmd==='pip3') return 'Usage: pip <command> [options]\n\nCommands:\n  install     Install packages\n  uninstall   Uninstall packages\n  list        List installed packages\n  show        Show package info\n  freeze      Output installed packages in requirements format\n  search      Search PyPI for packages';
  if(cmd.startsWith('pip ')||cmd.startsWith('pip3 ')) return `pip: simulated — ${cmd}`;
  if(cmd==='node'||cmd==='node -v') return cmd==='node'?'Welcome to Node.js v20.11.0.\nType ".help" for more information.\n> ':'v20.11.0';
  if(cmd.startsWith('node ')) return `(executing ${cmd.split(' ').pop()})`;
  if(cmd==='python'||cmd==='python3') return 'Python 3.11.6 (main, Oct 2023)\n[GCC 12.3.0] on linux\nType "help", "copyright", "credits" or "license" for more.\n>>> ';
  if(cmd==='python --version'||cmd==='python3 --version') return 'Python 3.11.6';
  if(cmd.startsWith('python ')||cmd.startsWith('python3 ')) return `(executing ${cmd.split(' ').pop()})`;
  if(cmd==='git'||cmd==='git --version') return cmd==='git'?'usage: git <command> [<args>]\n\nCommon commands:\n   clone    Clone a repository\n   init     Create an empty repo\n   add      Add file contents to index\n   commit   Record changes to repo\n   push     Update remote refs\n   pull     Fetch and integrate\n   status   Show working tree status\n   log      Show commit logs\n   branch   List, create, or delete branches\n   checkout Switch branches':'git version 2.39.2';
  if(cmd.startsWith('git ')) return `(git: ${cmd.slice(4)})`;
  if(cmd==='docker'||cmd==='docker --version') return cmd==='docker'?'Usage: docker [OPTIONS] COMMAND\n\nCommon commands:\n  run       Create and run a container\n  ps        List containers\n  build     Build an image\n  pull      Download an image\n  images    List images\n  stop      Stop containers':'Docker version 24.0.7';
  if(cmd.startsWith('docker ')) return `(docker: ${cmd.slice(7)})`;
  if(cmd==='cargo'||cmd==='rustc --version') return cmd==='cargo'?'Rust package manager\n\nCommon commands:\n  cargo new     Create new project\n  cargo build   Compile the project\n  cargo run     Build and execute\n  cargo test    Run the tests':'rustc 1.75.0';
  if(cmd==='go'||cmd==='go version') return cmd==='go'?'Go is a tool for managing Go source code.\n\nCommon commands:\n  go build    compile packages\n  go run      compile and run\n  go test     test packages\n  go mod init initialize new module':'go version go1.21.6 linux/amd64';
  if(cmd==='gcc --version') return 'gcc (Ubuntu 12.3.0) 12.3.0';
  if(cmd==='make') return 'make: *** No targets specified. Stop.';
  if(cmd.startsWith('make ')) return `(building ${cmd.slice(5)}...)`;
  if(cmd==='curl --version') return 'curl 8.1.2 (x86_64-pc-linux-gnu)';
  if(cmd==='which node') return '/usr/bin/node';
  if(cmd==='which python3') return '/usr/bin/python3';
  if(cmd==='which git') return '/usr/bin/git';
  if(cmd==='which npm') return '/usr/bin/npm';
  if(cmd==='which pip') return '/usr/bin/pip';
  if(cmd==='which pip3') return '/usr/bin/pip3';
  if(cmd.startsWith('mount ')||cmd.startsWith('umount ')) return '';
  if(cmd.startsWith('fdisk ')||cmd.startsWith('mkfs ')) return '(disk operation)';
  if(cmd.startsWith('fsck ')) return '(filesystem check)';
  if(cmd.startsWith('dd ')) return '(data copy)';
  if(cmd.startsWith('diff ')) return '(differences)';
  if(cmd.startsWith('patch ')) return '(patched)';
  if(cmd.startsWith('traceroute ')||cmd.startsWith('tracepath ')) return `traceroute to ${cmd.split(' ')[1]}`;
  if(cmd.startsWith('read ')) return '(waiting for input)';
  if(cmd.startsWith('printf ')) return cmd.slice(7).replace(/["']/g,'');
  if(cmd.startsWith('declare ')) return '';
  if(cmd.startsWith('local ')) return '';
  if(cmd==='exit') return '';
  if(cmd==='passwd') return 'Changing password for user.\n(current) UNIX password:';
  if(cmd==='reboot'||cmd==='shutdown -h now') return '(system shutting down...)';
  if(cmd==='ss -tuln') return SH['netstat -tuln'];
  return undefined;
}

/* ── STATE ── */
let S={mod:null,qi:0,sc:0,comp:{},miss:{},best:{}};
function load(){try{const d=JSON.parse(localStorage.getItem(LS));if(d){S.comp=d.c||{};S.miss=d.m||{};S.best=d.b||{};}}catch(e){}}
function save(){localStorage.setItem(LS,JSON.stringify({c:S.comp,m:S.miss,b:S.best}));}

/* ── IO ── */
function pr(t,c){const d=document.createElement('div');if(c)d.className=c;d.textContent=t;T.appendChild(d);T.scrollTop=T.scrollHeight;}
function prM(s){s.split('\n').forEach(l=>pr(l));}
function ty(t){I.value+=t;I.focus();}
function go(){run(I.value);I.value='';I.focus();}
I.addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();go();}
  if(e.key==='ArrowUp'){e.preventDefault();if(hist.length){hIdx=Math.min(hIdx+1,hist.length-1);I.value=hist[hIdx];}}
  if(e.key==='ArrowDown'){e.preventDefault();hIdx>0?(hIdx--,I.value=hist[hIdx]):(hIdx=-1,I.value='');}
});

/* ── MAIN ROUTER ── */
function run(raw){
  let cmd=raw.trim().replace(/\s+/g,' ');
  if(!cmd)return;
  pr(`user@linux:~$ ${raw}`,'echo');
  hist.unshift(raw);hIdx=-1;if(hist.length>100)hist.length=100;

  // Clear always works
  if(cmd==='clear'){T.innerHTML='';return;}

  // Review mode
  if(S.mod==='__review'){reviewAns(cmd);return;}

  // Quiz mode
  if(S.mod){
    if(cmd==='exit'||cmd==='quit'){pr('Exited module.','y');S.mod=null;return;}
    if(cmd==='hint'){doHint();return;}
    if(cmd==='skip'){doSkip();return;}
    checkAns(cmd);return;
  }

  // Trainer meta-commands
  if(cmd==='help'||cmd==='h'){showHelp();return;}
  if(cmd==='status'||cmd==='progress'){showStatus();return;}
  if(cmd==='review'){startReview();return;}
  if(cmd==='toc'||cmd==='chapters'){showTOC();return;}
  if(cmd==='reset'){localStorage.removeItem(LS);S={mod:null,qi:0,sc:0,comp:{},miss:{},best:{}};pr('Progress reset.','r');return;}
  if(cmd.startsWith('start ')){
    const t=cmd.split(' ')[1];let fid=null;
    if(M[t])fid=t;else{const k=Object.keys(M),n=parseInt(t);if(n>0&&n<=k.length)fid=k[n-1];}
    if(fid)startMod(fid);else pr(`Module "${t}" not found.`,'r');
    return;
  }

  // ── LIVE SHELL ──
  const r=simShell(cmd);
  if(r===null)return;
  if(r!==undefined){if(r)prM(r);return;}

  // Unknown
  pr(`bash: ${cmd.split(' ')[0]}: command not found`,'r');
}

/* ── HELP ── */
function showHelp(){
  const keys=Object.keys(M),tQ=keys.reduce((s,k)=>s+M[k].q.length,0);
  pr('');
  pr('═══════════════════════════════════════════════════','b');
  pr('  Linux Pocket Trainer                             ','b');
  pr('  Source: "The Linux Command Line" (555 pages)     ','b');
  pr(`  ${keys.length} modules · ${tQ} questions · Live shell simulation  `,'b');
  pr('═══════════════════════════════════════════════════','b');
  pr('');
  pr('  help          This menu','w');
  pr('  toc           Book chapter map','w');
  pr('  start <id|#>  Start a quiz module','w');
  pr('  status        Progress dashboard','w');
  pr('  review        Replay missed questions only','w');
  pr('  hint / skip   During quizzes','w');
  pr('  exit          Leave current module','w');
  pr('  clear         Clear screen','w');
  pr('  reset         Wipe all progress','w');
  pr('');
  [{n:'Part 1: Learning the Shell',p:1},{n:'Part 2: Configuration',p:2},{n:'Part 3: Common Tasks',p:3},{n:'Part 4: Shell Scripts',p:4}].forEach(part=>{
    pr(`── ${part.n} ──`,'b');
    keys.forEach((k,i)=>{
      if(M[k].p!==part.p)return;
      const m=M[k],done=S.comp[k],b=S.best[k];
      pr(`  ${(i+1+'').padStart(2)}. start ${k.padEnd(8)} ${done?'✔':'○'} ${m.t} [${m.q.length}q]${b!==undefined?' best:'+b+'/'+m.q.length:''}`);
    });
  });
  pr('');
  pr('💡 Real commands work too: pwd, ls -la, df -h, ps aux, etc.','d');
}

function showTOC(){
  pr('');pr('"The Linux Command Line" — Chapter Map','b');pr('─'.repeat(44),'b');
  [['Part 1: Learning the Shell','nav explore files wild cmds redir expn keys perms procs'],
   ['Part 2: Configuration','env vi'],
   ['Part 3: Common Tasks','pkg storage net find archive regex text sysadmin'],
   ['Part 4: Shell Scripts','script flow loops adv']
  ].forEach(([nm,ids])=>{
    const ms=ids.split(' '),dn=ms.filter(id=>S.comp[id]).length;
    pr(`\n  ${nm} (${dn}/${ms.length})`,'b');
    ms.forEach(id=>{if(M[id])pr(`    ${S.comp[id]?'✔':'○'} ${M[id].t} [${M[id].q.length}]`);});
  });
}

function showStatus(){
  const keys=Object.keys(M),total=keys.length,done=Object.keys(S.comp).length;
  const tQ=keys.reduce((s,k)=>s+M[k].q.length,0);
  const missQ=Object.keys(S.miss).reduce((s,k)=>s+(S.miss[k]||[]).length,0);
  const pct=Math.round(done/total*100),bL=30,f=Math.round(pct/100*bL);
  pr('');pr(`═══ ${done}/${total} modules mastered ═══`,'b');
  pr(`[${'█'.repeat(f)}${'░'.repeat(bL-f)}] ${pct}%`,'g');
  pr(`${tQ} total questions`,'d');
  if(missQ)pr(`📝 ${missQ} missed — type "review"`,'y');
  pr('');
  keys.forEach(k=>{
    const m=M[k],c=S.comp[k],b=S.best[k];
    pr(`  ${c?'✔':'○'} ${m.t}${b!==undefined?' — best:'+b+'/'+m.q.length:''} `,c?'g':'d');
  });
}

/* ── QUIZ ── */
function startMod(id){
  S.mod=id;S.qi=0;S.sc=0;
  const m=M[id];
  pr(`\n┌── ${m.t} ──┐`,'b');
  pr(`│ ${m.q.length} questions · hint · skip · exit │`,'d');
  askQ();
}
function askQ(){
  const m=M[S.mod];
  if(S.qi>=m.q.length){finishMod();return;}
  pr(`\n[${S.qi+1}/${m.q.length}] ${m.q[S.qi].q}`,'y');
}
function doHint(){
  const a=M[S.mod].q[S.qi].a[0],show=a.substring(0,Math.ceil(a.length*0.4));
  pr(`  💡 "${show}…"`,'d');
}
function doSkip(){
  const q=M[S.mod].q[S.qi];
  pr(`  ⏭ ${q.a[0]}`,'d');
  trackMiss(S.mod,S.qi);S.qi++;askQ();
}
function checkAns(cmd){
  const q=M[S.mod].q[S.qi];
  if(q.a.some(a=>a===cmd)){pr('  ✔ Correct!','g bld');S.sc++;}
  else{
    if(q.a.some(a=>a.toLowerCase()===cmd.toLowerCase()))pr(`  ✘ Case matters! Expected: ${q.a[0]}`,'r');
    else pr(`  ✘ Expected: ${q.a[0]}`,'r');
    if(q.a.length>1)pr(`    Also: ${q.a.slice(1).join(', ')}`,'dd');
    trackMiss(S.mod,S.qi);
  }
  S.qi++;askQ();
}
function trackMiss(mid,qi){if(!S.miss[mid])S.miss[mid]=[];if(!S.miss[mid].includes(qi))S.miss[mid].push(qi);save();}
function finishMod(){
  const m=M[S.mod],t=m.q.length,p=Math.round(S.sc/t*100);
  pr(`\n  Score: ${S.sc}/${t} (${p}%)`,'b bld');
  if(!S.best[S.mod]||S.sc>S.best[S.mod])S.best[S.mod]=S.sc;
  if(S.sc===t){pr('  ★ MASTERED ★','g bld');S.comp[S.mod]=true;delete S.miss[S.mod];}
  else if(p>=80)pr('  Good! 100% to master.','y');
  else pr('  Keep going. Try "review".','d');
  save();S.mod=null;
}

/* ── REVIEW ── */
let _rP=[],_ri=0,_rc=0;
function startReview(){
  _rP=[];
  Object.keys(S.miss).forEach(mid=>{(S.miss[mid]||[]).forEach(qi=>{if(M[mid]&&M[mid].q[qi])_rP.push({mid,qi,q:M[mid].q[qi]});});});
  if(!_rP.length){pr('No missed questions! 🎉','g');return;}
  for(let i=_rP.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[_rP[i],_rP[j]]=[_rP[j],_rP[i]];}
  _ri=0;_rc=0;S.mod='__review';
  pr(`\n═══ Review: ${_rP.length} missed ═══`,'p');
  pr(`[1/${_rP.length}] ${_rP[0].q.q}`,'p');
}
function reviewAns(cmd){
  if(cmd==='exit'||cmd==='quit'){pr(`Review: ${_rc}/${_rP.length} fixed.`,'p');S.mod=null;return;}
  if(cmd==='hint'){const a=_rP[_ri].q.a[0];pr(`  💡 "${a.substring(0,Math.ceil(a.length*0.4))}…"`,'d');return;}
  if(cmd==='skip'){pr(`  ⏭ ${_rP[_ri].q.a[0]}`,'d');_ri++;if(_ri>=_rP.length){pr(`Done. ${_rc}/${_rP.length}`,'p');S.mod=null;return;}pr(`\n[${_ri+1}/${_rP.length}] ${_rP[_ri].q.q}`,'p');return;}
  const q=_rP[_ri].q;
  if(q.a.some(a=>a===cmd)){
    pr('  ✔ Fixed!','g bld');_rc++;
    const ma=S.miss[_rP[_ri].mid];if(ma){const x=ma.indexOf(_rP[_ri].qi);if(x>-1)ma.splice(x,1);if(!ma.length)delete S.miss[_rP[_ri].mid];}save();
  }else pr(`  ✘ Expected: ${q.a[0]}`,'r');
  _ri++;
  if(_ri>=_rP.length){pr(`\nReview done. ${_rc}/${_rP.length} fixed.`,'p');S.mod=null;save();return;}
  pr(`\n[${_ri+1}/${_rP.length}] ${_rP[_ri].q.q}`,'p');
}

/* ── WELCOME ── */
load();
const _k=Object.keys(M),_tQ=_k.reduce((s,k)=>s+M[k].q.length,0),_dn=Object.keys(S.comp).length;
pr('═══════════════════════════════════════════════════','b');
pr('       Linux Pocket Trainer                        ','b');
pr('  "The Linux Command Line" — 555 pages distilled   ','b');
pr(`  ${_k.length} modules · ${_tQ} questions · Live shell simulation   `,'b');
pr('═══════════════════════════════════════════════════','b');
pr('');
if(_dn)pr(`Welcome back. ${_dn}/${_k.length} mastered.`,'g');
pr('Type "help" for modules. Real commands work: try pwd, ls, df -h','y');
window.onload=()=>I.focus();
document.addEventListener('click',()=>{if(!window.getSelection().toString())I.focus();});
</script>
