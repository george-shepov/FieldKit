<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GigTax Quick — 2025</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050505;--bg2:#0d0d0d;--bg3:#111111;
  --border:#1e1e1e;--border2:#2a2a2a;
  --text:#f0f0f0;--text2:#7f8790;--text3:#4f555d;
  --accent:#10b981;--accent2:rgba(16,185,129,0.3);--accent-bg:rgba(16,185,129,0.12);
  --red:hsl(0,65%,55%);--red-bg:hsl(0,40%,12%);
  --amber:hsl(38,75%,55%);--amber-bg:hsl(38,40%,12%);
  --blue:hsl(210,65%,55%);--blue-bg:hsl(210,40%,12%);
  --radius:8px;--radius-lg:12px;
  --font:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-lg:0 4px 12px rgba(0,0,0,.4);
}
html{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
body{min-height:100vh;overflow-y:auto}
input,select,button,textarea{font-family:inherit;font-size:inherit}
.app{width:min(1280px,100%);max-width:none;margin:0 auto;padding:clamp(12px,2vw,24px)}
/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 14px;border-bottom:1px solid var(--border);margin-bottom:14px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#0f9b6d);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#031810}
.logo-text{font-size:20px;font-weight:750;letter-spacing:-0.3px}
.logo-tag{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:8px}
.ty-badge{font:600 11px/1 var(--mono);color:var(--text2)}
/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600}
.card-head .badge{font-size:12px;font-weight:600}
.card-body{padding:16px}
/* Summary strip */
.summary-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}
.summary-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 10px;text-align:center}
.summary-item .label{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.summary-item .value{margin-top:4px;font-family:var(--mono);font-size:18px;font-weight:700}
.quick-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}
.quick-actions .btn{width:100%;justify-content:center}
/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tab{padding:8px 10px;border-radius:var(--radius);font-size:11px;font-weight:650;background:var(--bg2);color:var(--text2);border:1px solid var(--border);cursor:pointer;white-space:nowrap;transition:all .15s;text-align:center;min-width:98px;display:grid;place-items:center;gap:2px}
.tab:hover{background:var(--bg3);color:var(--text)}
.tab.active{background:var(--bg3);color:var(--accent);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-bg) inset}
.tab .tab-icon{font-size:16px;line-height:1}
.tab .count{opacity:.7}
/* Form elements */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .span-2{grid-column:span 2}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.input,.select{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13px;transition:border-color .15s;width:100%}
.input:focus,.select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent2)}
.select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23666' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:30px}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{filter:brightness(1.1)}
.btn-ghost{background:var(--bg2);color:var(--text2);padding:6px 10px;border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);background:var(--bg3)}
.btn-full{width:100%;margin-top:10px}
/* List items */
.item{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:var(--radius);padding:8px 12px;margin-bottom:6px}
.item:last-child{margin-bottom:0}
.item-left{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
.item-main{font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.item-sub{font-size:11px;color:var(--text3)}
.item-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.item .del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}.item .del:hover{color:var(--red);background:var(--red-bg)}
.tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.tag-green{color:var(--accent);background:var(--accent-bg)}
.tag-amber{color:var(--amber);background:var(--amber-bg)}
.tag-blue{color:var(--blue);background:var(--blue-bg)}
.tag-red{color:var(--red);background:var(--red-bg)}
/* Tax summary rows */
.row{display:flex;justify-content:space-between;padding:3px 0;font-size:13px}
.row.bold{font-weight:600}
.row.big{font-size:15px;padding:6px 0}
.row .val{font-weight:500;text-align:right}
.divider{border-top:1px solid var(--border);margin:6px 0}
/* Suggestions */
.suggestion{background:var(--accent-bg);border:1px solid hsl(160,30%,20%);border-radius:var(--radius);padding:8px 12px;font-size:12px;color:hsl(160,50%,65%);margin-bottom:6px}
/* Alerts */
.alert{border-radius:var(--radius);padding:10px 12px;font-size:12px;margin-top:8px}
.alert-amber{background:var(--amber-bg);border:1px solid hsl(38,30%,22%);color:hsl(38,60%,65%)}
.alert-green{background:var(--accent-bg);border:1px solid hsl(160,30%,20%);color:hsl(160,50%,65%)}
/* Pin screen */
.pin-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.pin-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;width:100%;max-width:360px;box-shadow:var(--shadow-lg)}
.pin-box h1{text-align:center;font-size:22px;color:var(--accent);margin-bottom:4px}
.pin-box .subtitle{text-align:center;font-size:12px;color:var(--text3);margin-bottom:20px}
.pin-box .icon{text-align:center;font-size:36px;margin-bottom:8px}
.error{color:var(--red);font-size:12px;margin-top:6px}
/* Scrollable list */
.list-scroll{max-height:280px;overflow-y:auto;padding-right:4px}
.list-scroll::-webkit-scrollbar{width:4px}
.list-scroll::-webkit-scrollbar-track{background:transparent}
.list-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* Export */
.export-pre{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-family:var(--mono);font-size:11px;color:var(--text2);white-space:pre-wrap;max-height:400px;overflow-y:auto;line-height:1.6}
/* Footer */
.footer{text-align:center;font-size:10px;color:var(--text3);padding:16px 0 24px;line-height:1.6}
/* Responsive */
@media(max-width:760px){
  .summary-strip{grid-template-columns:1fr 1fr}
}
@media(max-width:500px){
  .form-grid{grid-template-columns:1fr}
  .form-grid .span-2{grid-column:span 1}
  .summary-strip{grid-template-columns:1fr}
  .quick-actions{grid-template-columns:1fr}
}
/* Animation */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .2s ease}
/* Suite nav */
.suite-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px}
.suite-nav a{color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .15s}
.suite-nav a:hover{color:var(--accent)}
.suite-nav .suite-name{color:var(--text3);font-family:var(--mono);font-size:11px}
</style>
</head>

<script>
const PLATFORMS=[
  "Rover","Wag","TaskRabbit","Thumbtack","Care.com","Instacart Shipt",
  "DoorDash","Uber","Lyft","Uber Eats","Grubhub",
  "Amazon Flex","Spark Driver","Roadie",
  "Facebook Marketplace","eBay","Mercari","Etsy","Poshmark","Depop",
  "Craigslist","OfferUp","Shopify",
  "Fiverr","Upwork","Freelancer","Guru",
  "YouTube","TikTok","Patreon","Substack",
  "Airbnb","VRBO","Turo","Other"
];
const EXPENSE_CATS=[
  {code:"advertising",label:"Advertising",line:"Line 8"},
  {code:"car_expense",label:"Car & Truck (non-mileage)",line:"Line 9"},
  {code:"commissions",label:"Commissions & Fees",line:"Line 10"},
  {code:"platform_fees",label:"Platform/Seller Fees",line:"Line 10"},
  {code:"equipment",label:"Equipment/Tools",line:"Line 13"},
  {code:"depreciation",label:"Depreciation",line:"Line 13"},
  {code:"interest_mortgage",label:"Mortgage Interest",line:"Line 16a"},
  {code:"interest_other",label:"Other Interest",line:"Line 16b"},
  {code:"insurance",label:"Insurance",line:"Line 15"},
  {code:"legal_professional",label:"Legal & Professional",line:"Line 17"},
  {code:"office",label:"Office Expense",line:"Line 18"},
  {code:"rent_lease_vehicle",label:"Rent/Lease Vehicle",line:"Line 20a"},
  {code:"rent_lease_other",label:"Rent/Lease Other",line:"Line 20b"},
  {code:"repairs_maintenance",label:"Repairs & Maintenance",line:"Line 21"},
  {code:"supplies",label:"Supplies",line:"Line 22"},
  {code:"taxes_licenses",label:"Taxes & Licenses",line:"Line 23"},
  {code:"travel",label:"Travel",line:"Line 24a"},
  {code:"meals",label:"Meals (50%)",line:"Line 24b"},
  {code:"phone",label:"Phone/Internet",line:"Line 25"},
  {code:"utilities",label:"Utilities",line:"Line 25"},
  {code:"wages",label:"Wages (Employees)",line:"Line 26"},
  {code:"software",label:"Software/Subscriptions",line:"Line 27a"},
  {code:"shipping",label:"Shipping & Postage",line:"Line 27a"},
  {code:"home_office",label:"Home Office",line:"Line 30"},
  {code:"cogs",label:"Cost of Goods Sold",line:"Line 4"},
  {code:"other",label:"Other Expense",line:"Line 27a"}
];
const MILEAGE_RATE=0.67;
const SE_TAX_RATE=0.153;
const SE_NET_FACTOR=0.9235;
const STD_DED={single:14600,married:29200,hoh:21900};
const FED_BRACKETS={
  single:[[11600,.10],[47150,.12],[100525,.22],[191950,.24],[243725,.32],[609350,.35],[1e15,.37]],
  married:[[23200,.10],[94300,.12],[201050,.22],[383900,.24],[487450,.32],[731200,.35],[1e15,.37]],
  hoh:[[16550,.10],[63100,.12],[100500,.22],[191950,.24],[243700,.32],[609350,.35],[1e15,.37]]
};
const OHIO_BRACKETS=[[26050,0],[46100,.02765],[92150,.03226],[115300,.03688],[1e15,.03990]];
const LS_DATA="gigtax_data";

const uid=()=>Math.random().toString(36).slice(2,10);
const fmt=n=>"$"+Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN=n=>Number(n||0).toLocaleString("en-US",{maximumFractionDigits:0});
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);

const emptyData=()=>({income:[],expenses:[],mileage:[],profile:{filing_status:"single",other_w2_income:0,dependents:0,custom_platforms:[]}});

let DATA=emptyData();
let TAB="income";

function load(){try{const d=localStorage.getItem(LS_DATA);return d?JSON.parse(d):null}catch(e){return null}}
function save(){localStorage.setItem(LS_DATA,JSON.stringify(DATA))}

function hydrateDataFromStorage(){
  const saved=load();
  if(saved){
    DATA={...emptyData(),...saved,profile:{...emptyData().profile,...(saved.profile||{})}};
  }
}

function calcTax(){
  const d=DATA;
  const gross=d.income.reduce((s,i)=>s+Number(i.amount||0),0);
  const totalExp=d.expenses.reduce((s,e)=>{
    const amt=Number(e.amount||0)*(e.category==="meals"?.5:1)*(Number(e.deductible_pct||100)/100);
    return s+amt;
  },0);
  const totalMiles=d.mileage.reduce((s,m)=>s+Number(m.miles||0),0);
  const mileDed=totalMiles*MILEAGE_RATE;
  const net=gross-totalExp-mileDed;
  const seBase=net>400?net*SE_NET_FACTOR:0;
  const seTax=seBase*SE_TAX_RATE;
  const seDed=seTax/2;
  const w2=Number(d.profile.other_w2_income)||0;
  const agi=w2+net-seDed;
  const sd=STD_DED[d.profile.filing_status]||STD_DED.single;
  const taxable=Math.max(0,agi-sd);
  const brackets=FED_BRACKETS[d.profile.filing_status]||FED_BRACKETS.single;
  let fed=0,prev=0;
  for(const[limit,rate]of brackets){if(taxable<=prev)break;fed+=(Math.min(taxable,limit)-prev)*rate;prev=limit}
  let ohio=0,oPrev=0;
  const oTaxable=Math.max(0,agi-2400*(1+(Number(d.profile.dependents)||0)));
  for(const[limit,rate]of OHIO_BRACKETS){if(oTaxable<=oPrev)break;ohio+=(Math.min(oTaxable,limit)-oPrev)*rate;oPrev=limit}
  const total=fed+seTax+ohio;
  const bySrc={};d.income.forEach(i=>{bySrc[i.platform]=(bySrc[i.platform]||0)+Number(i.amount)});
  const byCat={};d.expenses.forEach(e=>{const c=EXPENSE_CATS.find(x=>x.code===e.category);const l=c?c.label:e.category;const a=Number(e.amount)*(e.category==="meals"?.5:1)*(Number(e.deductible_pct||100)/100);byCat[l]=(byCat[l]||0)+a});
  return{gross,totalExp,totalMiles,mileDed,net,seBase,seTax,seDed,w2,agi,sd,taxable,fed,ohio,total,bySrc,byCat};
}

function genReport(){
  const t=calcTax();
  let r=`GIGTAX QUICK — 2025 TAX SUMMARY\nGenerated: ${new Date().toLocaleDateString()}\n${"=".repeat(50)}\n\n`;
  r+=`FILING STATUS: ${DATA.profile.filing_status.toUpperCase()}\n`;
  if(t.w2>0)r+=`W-2 INCOME: ${fmt(t.w2)}\n`;
  r+=`\n--- INCOME BY PLATFORM ---\n`;
  Object.entries(t.bySrc).forEach(([k,v])=>{r+=`  ${k}: ${fmt(v)}\n`});
  r+=`  GROSS TOTAL: ${fmt(t.gross)}\n`;
  r+=`\n--- DEDUCTIONS ---\n`;
  Object.entries(t.byCat).forEach(([k,v])=>{r+=`  ${k}: ${fmt(v)}\n`});
  if(t.mileDed>0)r+=`  Mileage (${fmtN(t.totalMiles)} mi): ${fmt(t.mileDed)}\n`;
  r+=`  TOTAL DEDUCTIONS: ${fmt(t.totalExp+t.mileDed)}\n`;
  r+=`\n--- SCHEDULE C ---\n  Gross: ${fmt(t.gross)}\n  Expenses: ${fmt(t.totalExp+t.mileDed)}\n  Net Profit: ${fmt(t.net)}\n`;
  r+=`\n--- TAX ESTIMATE ---\n  Federal: ${fmt(t.fed)}\n  SE Tax: ${fmt(t.seTax)}\n  Ohio: ${fmt(t.ohio)}\n  TOTAL: ${fmt(t.total)}\n`;
  r+=`\n--- INCOME DETAIL ---\n`;
  DATA.income.forEach(i=>{r+=`  ${i.date} | ${i.platform} | ${fmt(i.amount)} | ${i.form_type} | ${i.description||""}\n`});
  r+=`\n--- EXPENSE DETAIL ---\n`;
  DATA.expenses.forEach(e=>{const c=EXPENSE_CATS.find(x=>x.code===e.category);r+=`  ${e.date} | ${c?.label||e.category} | ${fmt(e.amount)} | ${e.deductible_pct}% | ${e.description||""}\n`});
  r+=`\n--- MILEAGE DETAIL ---\n`;
  DATA.mileage.forEach(m=>{r+=`  ${m.date} | ${m.miles} mi | ${fmt(m.miles*MILEAGE_RATE)} | ${m.description||""}\n`});
  r+=`\n${"=".repeat(50)}\nESTIMATE ONLY. Not tax advice. Consult a professional.\n`;
  return r;
}

function normalizeDateInput(v){
  const raw=String(v||"").trim();
  if(!raw) return new Date().toISOString().slice(0,10);
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  const d=new Date(raw);
  if(!Number.isNaN(d.getTime())) return d.toISOString().slice(0,10);
  return new Date().toISOString().slice(0,10);
}

function parseCsvRows(text){
  const rows=[];let row=[];let cell="";let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i],next=text[i+1];
    if(ch==='"'){
      if(inQuotes&&next==='"'){cell+='"';i++;continue;}
      inQuotes=!inQuotes;continue;
    }
    if(ch===','&&!inQuotes){row.push(cell);cell="";continue;}
    if((ch==='\n'||ch==='\r')&&!inQuotes){
      if(ch==='\r'&&next==='\n') i++;
      row.push(cell);
      rows.push(row);
      row=[];cell="";
      continue;
    }
    cell+=ch;
  }
  if(cell.length||row.length){row.push(cell);rows.push(row);}
  if(!rows.length) return [];
  const headers=rows[0].map(h=>String(h||"").trim().toLowerCase());
  return rows.slice(1).filter(r=>r.some(x=>String(x||"").trim())).map(r=>{
    const out={};
    headers.forEach((h,idx)=>{out[h]=String(r[idx]||"").trim();});
    return out;
  });
}

function mapReceiptCategory(raw){
  const s=String(raw||"").toLowerCase();
  if(/platform fee|processing fee|commission|marketplace fee|seller fee/.test(s)) return "platform_fees";
  if(/cost of goods|inventory|resale item|cogs/.test(s)) return "cogs";
  if(/meal|restaurant|coffee|cafe|diner|food/.test(s)) return "meals";
  if(/travel|airfare|hotel|lodging|uber|lyft|taxi|flight|train/.test(s)) return "travel";
  if(/shipping|postage|label|usps|ups|fedex/.test(s)) return "shipping";
  if(/software|subscription|saas|app|cloud|openai|microsoft|google|aws/.test(s)) return "software";
  if(/office|printer|paper|ink/.test(s)) return "office";
  if(/supply|tool|material|equipment/.test(s)) return "supplies";
  if(/insurance/.test(s)) return "insurance";
  if(/phone|internet|mobile|cell/.test(s)) return "phone";
  if(/utility|electric|water|gas/.test(s)) return "utilities";
  if(/tax|license|permit|registration/.test(s)) return "taxes_licenses";
  if(/legal|attorney|lawyer|accounting|bookkeep|tax prep|cpa/.test(s)) return "legal_professional";
  if(/rent|lease/.test(s)) return "rent_lease_other";
  if(/repair|maintenance/.test(s)) return "repairs_maintenance";
  if(/interest|apr|finance charge/.test(s)) return "interest_other";
  if(/advertis|promo|marketing/.test(s)) return "advertising";
  return "other";
}

async function importReceiptTrackerCsv(file){
  const text=await file.text();
  const rows=parseCsvRows(text);
  if(!rows.length) throw new Error("CSV has no rows.");
  const expenseKeys=new Set(DATA.expenses.map(e=>[
    normalizeDateInput(e.date),Number(e.amount||0).toFixed(2),e.category||"",String(e.description||"").trim().toLowerCase()
  ].join("|")));
  const incomeKeys=new Set(DATA.income.map(i=>[
    normalizeDateInput(i.date),Number(i.amount||0).toFixed(2),i.platform||"",String(i.description||"").trim().toLowerCase()
  ].join("|")));

  let addedExpenses=0,addedIncome=0,skipped=0;
  for(const rec of rows){
    const rawAmount=String(rec.amount||"").replace(/[^0-9.-]/g,"");
    const amount=Number(rawAmount);
    if(!Number.isFinite(amount)||amount===0){skipped++;continue;}

    const date=normalizeDateInput(rec.date);
    const vendor=(rec.vendor||"Imported").trim()||"Imported";
    const categoryText=String(rec.category||"");
    const notes=[rec.notes,rec.payment_method?`pay:${rec.payment_method}`:"",rec.file_name?`file:${rec.file_name}`:""]
      .filter(Boolean).join(" | ");
    const description=[vendor,notes].filter(Boolean).join(" — ");
    const isIncome=/income|revenue|sale|sales/.test(categoryText.toLowerCase())&&amount>0;
    const absAmount=Math.abs(amount);

    if(isIncome){
      if(!PLATFORMS.includes(vendor)&&!DATA.profile.custom_platforms.includes(vendor)) DATA.profile.custom_platforms.push(vendor);
      const key=[date,absAmount.toFixed(2),vendor,description.toLowerCase()].join("|");
      if(incomeKeys.has(key)){skipped++;continue;}
      incomeKeys.add(key);
      DATA.income.push({
        id:uid(),
        platform:vendor,
        form_type:"no_form",
        amount:absAmount,
        date,
        description:description||"Imported from Receipt Tracker CSV"
      });
      addedIncome++;
      continue;
    }

    const category=mapReceiptCategory(`${categoryText} ${vendor} ${notes}`);
    const eKey=[date,absAmount.toFixed(2),category,description.toLowerCase()].join("|");
    if(expenseKeys.has(eKey)){skipped++;continue;}
    expenseKeys.add(eKey);
    DATA.expenses.push({
      id:uid(),
      category,
      amount:absAmount,
      date,
      deductible_pct:100,
      description:description||"Imported from Receipt Tracker CSV"
    });
    addedExpenses++;
  }
  save();
  return {addedExpenses,addedIncome,skipped,total:rows.length};
}

async function runReceiptImportFlow(file){
  if(!file){alert("Choose a CSV file first.");return false;}
  try{
    const out=await importReceiptTrackerCsv(file);
    alert(`Imported ${out.addedExpenses} expenses and ${out.addedIncome} income entries. Skipped ${out.skipped}.`);
    TAB=out.addedIncome>0?"income":"expenses";
    renderApp();
    return true;
  }catch(err){
    alert(`Import failed: ${err&&err.message?err.message:String(err)}`);
    return false;
  }
}

    </div>
    <div class="card">
      <div class="card-head">Preview</div>
      <div class="card-body"><pre class="export-pre">${esc(report)}</pre></div>
    </div>`;
  $("#x-rt-import").onclick=async()=>{
    const file=$("#x-rt-file").files&&$("#x-rt-file").files[0];
    await runReceiptImportFlow(file);
  };
  $("#x-copy").onclick=()=>{navigator.clipboard.writeText(report).then(()=>{$("#x-copy").textContent="✓ Copied!";setTimeout(()=>$("#x-copy").textContent="📋 Copy to Clipboard",2000)})};
  $("#x-dl").onclick=()=>{const b=new Blob([report],{type:"text/plain"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="gigtax-2025-summary.txt";a.click();URL.revokeObjectURL(u)};
}

function row(label,val,color,bold,big){
  return`<div class="row${bold?" bold":""}${big?" big":""}"><span>${label}</span><span class="val"${color?` style="color:${color}"`:""}">${val}</span></div>`;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

// Start
if(window.SuiteAuth&&window.SuiteAuth.hasProfile()&&window.SuiteAuth.isSignedIn()){
  hydrateDataFromStorage();
  renderApp();
}else{
  renderAuthGate();
}
</script>
