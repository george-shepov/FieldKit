<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Training Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-selection {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .game-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .game-btn.active {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            min-height: 500px;
            position: relative;
            overflow: hidden;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: white;
            font-size: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
        }

        /* Math Raindrops Game Styles */
        #mathGame {
            position: relative;
            height: 400px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .raindrop {
            position: absolute;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            animation: fall linear forwards;
        }

        .answer-input {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px;
            font-size: 18px;
            width: 200px;
            border: none;
            border-radius: 25px;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
        }

        /* Memory Game Styles */
        #memoryGame {
            display: none;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }

        .memory-card {
            aspect-ratio: 1;
            background: linear-gradient(45deg, #ff6b6b, #ffa8a8);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .memory-card.flipped {
            transform: rotateY(180deg);
            background: linear-gradient(45deg, #4ecdc4, #00b4db);
        }

        .memory-card.matched {
            background: linear-gradient(45deg, #45b7d1, #96c93d);
            cursor: default;
        }

        /* Stroop Test Game Styles */
        #stroopGame {
            display: none;
            text-align: center;
        }

        .stroop-stimulus {
            font-size: 72px;
            font-weight: bold;
            margin: 40px 0;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            display: inline-block;
            min-width: 300px;
        }

        .stroop-options {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stroop-btn {
            padding: 20px 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            min-width: 120px;
        }

        .stroop-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .stroop-btn:active {
            transform: scale(0.95);
        }

        .stroop-feedback {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            height: 40px;
        }

        .correct {
            color: #4caf50;
        }

        .incorrect {
            color: #f44336;
        }

        .controls {
            text-align: center;
            margin-top: 20px;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        @keyframes fall {
            to {
                transform: translateY(400px) rotate(-45deg);
            }
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
        }

        .instructions {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 16px;
        }
    </style>
  <link rel="stylesheet" href="../shared/suite-nav.css" />
</head>
<body>

    <div class="container">
        <div class="game-selection">
            <button class="game-btn active" onclick="showGame('math')">Math Raindrops</button>
            <button class="game-btn" onclick="showGame('memory')">Memory Cards</button>
            <button class="game-btn" onclick="showGame('stroop')">Stroop Test</button>
        </div>

        <div class="stats">
            <div class="stat-item">Score: <span id="score">0</span></div>
            <div class="stat-item">Time: <span id="timer">60</span>s</div>
            <div class="stat-item">Lives: <span id="lives">3</span></div>
            <div class="stat-item">Accuracy: <span id="accuracy">100%</span></div>
            <div class="stat-item">Streak: <span id="streak">0</span></div>
        </div>

        <div class="game-container">
            <!-- Math Raindrops Game -->
            <div id="mathGame">
                <div class="instructions">Solve the math problems on the raindrops before they reach the bottom!</div>
                <div class="answer-container">
                    <input type="text" class="answer-input" id="mathAnswer" placeholder="Type answer here..." autocomplete="off">
                </div>
            </div>

            <!-- Memory Card Game -->
            <div id="memoryGame">
                <div class="instructions">Find all matching pairs of cards!</div>
                <div class="memory-grid" id="memoryGrid"></div>
                <div class="controls">
                    <button class="start-btn" onclick="startMemoryGame()">Start Memory Game</button>
                </div>
            </div>

            <!-- Stroop Test Game -->
            <div id="stroopGame">
                <div class="instructions">Select the COLOR of the text, not the word itself!</div>
                <div class="stroop-stimulus" id="stroopStimulus">WORD</div>
                <div class="stroop-feedback" id="stroopFeedback"></div>
                <div class="stroop-options" id="stroopOptions">
                    <!-- Color buttons will be generated here -->
                </div>
                <div class="controls">
                    <button class="start-btn" onclick="startStroopGame()">Start Stroop Test</button>
                </div>
            </div>

            <div class="game-over" id="gameOver">
                <h2>Game Over!</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <p>Final Accuracy: <span id="finalAccuracy">100%</span></p>
                <button class="start-btn" onclick="restartGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        // Game state
        let currentGame = 'math';
        let score = 0;
        let timer = 60;
        let lives = 3;
        let correctAnswers = 0;
        let totalAttempts = 0;
        let currentStreak = 0;
        let gameInterval;
        let raindrops = [];
        let memoryCards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let stroopColors = ['red', 'blue', 'green', 'yellow', 'purple', 'orange'];
        let currentStroopTrial = null;

        // Game elements
        const mathGame = document.getElementById('mathGame');
        const memoryGame = document.getElementById('memoryGame');
        const stroopGame = document.getElementById('stroopGame');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const livesElement = document.getElementById('lives');
        const accuracyElement = document.getElementById('accuracy');
        const streakElement = document.getElementById('streak');
        const mathAnswer = document.getElementById('mathAnswer');
        const memoryGrid = document.getElementById('memoryGrid');
        const stroopStimulus = document.getElementById('stroopStimulus');
        const stroopFeedback = document.getElementById('stroopFeedback');
        const stroopOptions = document.getElementById('stroopOptions');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScore = document.getElementById('finalScore');
        const finalAccuracy = document.getElementById('finalAccuracy');

        // Show selected game
        function showGame(game) {
            currentGame = game;
            document.querySelectorAll('.game-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Hide all games
            mathGame.style.display = 'none';
            memoryGame.style.display = 'none';
            stroopGame.style.display = 'none';
            
            // Show selected game
            if (game === 'math') {
                mathGame.style.display = 'block';
                startMathGame();
            } else if (game === 'memory') {
                memoryGame.style.display = 'block';
                setupMemoryGame();
            } else if (game === 'stroop') {
                stroopGame.style.display = 'block';
                setupStroopGame();
            }
        }

        // Math Raindrops Game
        function startMathGame() {
            resetGame();
            gameInterval = setInterval(updateGame, 1000);
            createRaindrop();
            
            mathAnswer.focus();
            mathAnswer.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkAnswer(this.value);
                    this.value = '';
                }
            });
        }

        function createRaindrop() {
            const raindrop = document.createElement('div');
            raindrop.className = 'raindrop';
            
            // Generate random math problem
            const operations = ['+', '-', '*'];
            const op = operations[Math.floor(Math.random() * operations.length)];
            let num1, num2, answer;
            
            switch(op) {
                case '+':
                    num1 = Math.floor(Math.random() * 20) + 1;
                    num2 = Math.floor(Math.random() * 20) + 1;
                    answer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * 20) + 10;
                    num2 = Math.floor(Math.random() * 20) + 1;
                    answer = num1 - num2;
                    break;
                case '*':
                    num1 = Math.floor(Math.random() * 8) + 2;
                    num2 = Math.floor(Math.random() * 8) + 2;
                    answer = num1 * num2;
                    break;
            }
            
            raindrop.textContent = `${num1} ${op} ${num2}`;
            raindrop.style.left = Math.random() * 80 + 10 + '%';
            raindrop.style.animationDuration = (Math.random() * 3 + 2) + 's';
            
            raindrop.problem = raindrop.textContent;
            raindrop.answer = answer;
            
            mathGame.appendChild(raindrop);
            raindrops.push(raindrop);
            
            // Remove raindrop after animation
            setTimeout(() => {
                if (raindrop.parentElement) {
                    raindrop.remove();
                    const index = raindrops.indexOf(raindrop);
                    if (index > -1) {
                        raindrops.splice(index, 1);
                        loseLife();
                    }
                }
            }, parseFloat(raindrop.style.animationDuration) * 1000);
            
            // Schedule next raindrop
            if (timer > 0) {
                setTimeout(createRaindrop, Math.max(500, 2000 - score * 20));
            }
        }

        function checkAnswer(userAnswer) {
            totalAttempts++;
            if (raindrops.length > 0 && parseInt(userAnswer) === raindrops[0].answer) {
                raindrops[0].remove();
                raindrops.shift();
                score += 10;
                correctAnswers++;
                currentStreak++;
                updateStats();
            } else {
                loseLife();
                currentStreak = 0;
            }
        }

        function loseLife() {
            lives--;
            updateStats();
            if (lives <= 0) {
                endGame();
            }
        }

        // Memory Card Game
        function setupMemoryGame() {
            memoryGrid.innerHTML = '';
            const symbols = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
            memoryCards = [...symbols, ...symbols];
            memoryCards.sort(() => Math.random() - 0.5);
            
            memoryCards.forEach((symbol, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.symbol = symbol;
                card.dataset.index = index;
                card.innerHTML = '?';
                card.addEventListener('click', flipCard);
                memoryGrid.appendChild(card);
            });
        }

        function startMemoryGame() {
            resetGame();
            gameInterval = setInterval(updateGame, 1000);
            flippedCards = [];
            matchedPairs = 0;
            memoryGrid.querySelectorAll('.memory-card').forEach(card => {
                card.classList.remove('flipped', 'matched');
                card.innerHTML = '?';
            });
        }

        function flipCard() {
            if (flippedCards.length < 2 && !this.classList.contains('flipped') && !this.classList.contains('matched')) {
                this.classList.add('flipped');
                this.innerHTML = this.dataset.symbol;
                flippedCards.push(this);
                
                if (flippedCards.length === 2) {
                    totalAttempts++;
                    setTimeout(checkMatch, 500);
                }
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            
            if (card1.dataset.symbol === card2.dataset.symbol) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                score += 20;
                correctAnswers++;
                currentStreak++;
                
                if (matchedPairs === memoryCards.length / 2) {
                    score += timer * 5; // Bonus for finishing quickly
                    endGame();
                }
            } else {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                card1.innerHTML = '?';
                card2.innerHTML = '?';
                currentStreak = 0;
            }
            
            flippedCards = [];
            updateStats();
        }

        // Stroop Test Game
        function setupStroopGame() {
            // Create color buttons
            stroopOptions.innerHTML = '';
            stroopColors.forEach(color => {
                const button = document.createElement('button');
                button.className = 'stroop-btn';
                button.style.backgroundColor = color;
                button.textContent = color.charAt(0).toUpperCase() + color.slice(1);
                button.addEventListener('click', () => checkStroopAnswer(color));
                stroopOptions.appendChild(button);
            });
        }

        function startStroopGame() {
            resetGame();
            gameInterval = setInterval(updateGame, 1000);
            stroopFeedback.textContent = '';
            nextStroopTrial();
        }

        function nextStroopTrial() {
            // Clear feedback
            stroopFeedback.textContent = '';
            stroopFeedback.className = 'stroop-feedback';
            
            // Randomly select a word and a color
            const word = stroopColors[Math.floor(Math.random() * stroopColors.length)];
            let color = stroopColors[Math.floor(Math.random() * stroopColors.length)];
            
            // 30% chance of matching word and color
            const shouldMatch = Math.random() < 0.3;
            if (shouldMatch) {
                color = word;
            }
            
            // Display the stimulus
            stroopStimulus.textContent = word.charAt(0).toUpperCase() + word.slice(1);
            stroopStimulus.style.color = color;
            
            // Store the correct answer
            currentStroopTrial = {
                word: word,
                color: color,
                correctAnswer: color
            };
        }

        function checkStroopAnswer(selectedColor) {
            if (!currentStroopTrial) return;
            
            totalAttempts++;
            
            if (selectedColor === currentStroopTrial.correctAnswer) {
                // Correct answer
                score += 15;
                correctAnswers++;
                currentStreak++;
                stroopFeedback.textContent = 'Correct!';
                stroopFeedback.className = 'stroop-feedback correct';
            } else {
                // Incorrect answer
                lives--;
                currentStreak = 0;
                stroopFeedback.textContent = 'Incorrect!';
                stroopFeedback.className = 'stroop-feedback incorrect';
                
                if (lives <= 0) {
                    endGame();
                    return;
                }
            }
            
            updateStats();
            
            // Next trial after a short delay
            setTimeout(nextStroopTrial, 1000);
        }

        // Common game functions
        function updateGame() {
            timer--;
            timerElement.textContent = timer;
            
            if (timer <= 0) {
                endGame();
            }
        }

        function updateStats() {
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            timerElement.textContent = timer;
            streakElement.textContent = currentStreak;
            const accuracy = totalAttempts > 0 ? Math.round((correctAnswers / totalAttempts) * 100) : 100;
            accuracyElement.textContent = accuracy + '%';
        }

        function resetGame() {
            clearInterval(gameInterval);
            score = 0;
            timer = 60;
            lives = 3;
            correctAnswers = 0;
            totalAttempts = 0;
            currentStreak = 0;
            raindrops = [];
            mathGame.innerHTML = '<div class="instructions">Solve the math problems on the raindrops before they reach the bottom!</div><div class="answer-container"><input type="text" class="answer-input" id="mathAnswer" placeholder="Type answer here..." autocomplete="off"></div>';
            stroopFeedback.textContent = '';
            gameOverScreen.style.display = 'none';
            updateStats();
        }

        function endGame() {
            clearInterval(gameInterval);
            const accuracy = totalAttempts > 0 ? Math.round((correctAnswers / totalAttempts) * 100) : 100;
            finalScore.textContent = score;
            finalAccuracy.textContent = accuracy + '%';
            gameOverScreen.style.display = 'block';
        }

        function restartGame() {
            if (currentGame === 'math') {
                startMathGame();
            } else if (currentGame === 'memory') {
                startMemoryGame();
            } else if (currentGame === 'stroop') {
                startStroopGame();
            }
        }

        // Initialize with math game
        showGame('math');
    </script>
    <script src="../shared/help-content.js"></script>
    <script src="../shared/f1-help-nav.js"></script>
</body>
