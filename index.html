    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {

      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .header {
      text-align: center;
      padding: 40px 0;
      border-bottom: 2px solid #1e293b;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 2.5em;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .header p { color: #94a3b8; font-size: 1.1em; }
    .header-tools {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .help-btn {
      border: 1px solid #334155;
      border-radius: 10px;
      background: #111b30;
      color: #e2e8f0;
      padding: 9px 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .help-btn:hover { background: #1d2a46; }
    .install-btn {
      border-color: #14532d;
      background: #0d2f1b;
    }
    .install-btn:hover { background: #134429; }
    .help-hint { color: #94a3b8; font-size: 0.95em; }
    
    .category {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .category-header:hover { background: #334155; }
    .category-title {
      font-size: 1.2em;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .category-count {
      background: #334155;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.9em;
      color: #94a3b8;
    }
    .category-icon { font-size: 1.5em; }
    .chevron {
      transition: transform 0.3s;
      font-size: 1.2em;
      color: #64748b;
    }
    .category.open .chevron { transform: rotate(180deg); }
    
    .apps-list {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }
    .category.open .apps-list {
      max-height: 1000px;
      transition: max-height 0.5s ease-in;
    }
    .app-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-top: 1px solid #334155;
      transition: background 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .app-item:hover { background: #334155; }
    .app-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .app-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3em;
    }
    .app-name { font-weight: 500; }
    .app-desc { font-size: 0.9em; color: #94a3b8; }
    .badge {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.85em;
      font-weight: 600;
    }
    .badge.demo { background: #fbbf24; color: #000; }
    .badge.full { background: #10b981; color: #000; }
    .badge.free { background: #6366f1; color: #fff; }
    
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }
    .spinner {
      border: 3px solid #334155;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .help-overlay {
      position: fixed;
      inset: 0;
      display: none;
      background: rgba(2, 6, 23, 0.78);
      backdrop-filter: blur(2px);
      padding: 20px;
      z-index: 50;
    }
    .help-overlay.open {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .help-dialog {
      width: min(1100px, 100%);
      max-height: calc(100vh - 40px);
      overflow: auto;
      background: #0b1221;
      border: 1px solid #334155;
      border-radius: 14px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.5);
    }
    .help-head {
      position: sticky;
      top: 0;
      background: #0f172a;
      border-bottom: 1px solid #334155;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      z-index: 2;
    }
    .help-head h2 { font-size: 1.15em; }
    .help-head p { color: #94a3b8; font-size: 0.92em; margin-top: 4px; }
    .help-close {
      border: 1px solid #334155;
      background: #111827;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .help-close:hover { background: #1f2937; }
    .help-body { padding: 16px; display: grid; gap: 14px; }
    .help-section {
      background: #0f172a;
      border: 1px solid #273549;
      border-radius: 12px;
      overflow: hidden;
    }
    .help-section-head {
      padding: 12px 14px;
      font-weight: 700;
      border-bottom: 1px solid #1f2b3f;
      background: #111c31;
    }
    .help-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 10px;
      padding: 12px;
    }
    .help-card {
      background: #101826;
      border: 1px solid #2a3850;
      border-radius: 10px;
      padding: 10px;
    }
    .help-card h3 { font-size: 0.98em; margin-bottom: 6px; }
    .help-card p { font-size: 0.88em; color: #cbd5e1; line-height: 1.45; }
    .help-card p + p { margin-top: 6px; }
    .help-card strong { color: #93c5fd; }
    
    @media (max-width: 640px) {
      .header h1 { font-size: 2em; }
      .category-header { padding: 16px; }
      .app-item { padding: 14px 16px; }
      .app-desc { display: none; }
      .help-overlay { padding: 10px; }
      .help-dialog { max-height: calc(100vh - 20px); }
      .help-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    let cachedApps = null;

    function scanApps() {
      // Use static registry - assume all registered apps exist
      // This avoids CORS issues when opening via file:// protocol
      const foundApps = {};
      
      for (const [categoryKey, category] of Object.entries(APP_REGISTRY)) {
        foundApps[categoryKey] = { ...category, found: [] };
        
        for (const [appKey, appMeta] of Object.entries(category.apps)) {
          foundApps[categoryKey].found.push({
            key: appKey,
            ...appMeta
          });
        }
      }
      
      return foundApps;
    }

    function countApps(foundApps) {
      let total = 0;
      for (const category of Object.values(foundApps)) {
        total += category.found.length;
      }
      return total;
    }

      if (meta) return meta;

        .filter(category => category.found.length > 0)
        .map(category => {
          const cards = category.found.map(app => {
            const help = getAppHelp(app);
            return `
              <article class="help-card">
                <h3>${app.icon} ${app.name}</h3>
                <p><strong>Main feature:</strong> ${help.feature}</p>
                <p><strong>Main scenario:</strong> ${help.scenario}</p>
              </article>
            `;
          }).join('');
          return `
            <section class="help-section">
              <div class="help-section-head">${category.title}</div>
              <div class="help-grid">${cards}</div>
            </section>
          `;
        })
        .join('');
      document.getElementById('helpBody').innerHTML = html;
    }
    function openHelp() {
      const ov = document.getElementById('helpOverlay');
      ov.classList.add('open');
      ov.setAttribute('aria-hidden', 'false');
    }
    function closeHelp() {
      const ov = document.getElementById('helpOverlay');
      ov.classList.remove('open');
      ov.setAttribute('aria-hidden', 'true');
    }
    function isStandaloneMode() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }
    function isIOS() {
      return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    }
    function setInstallHint(message) {
      const hint = document.getElementById('installHint');
      if (!hint) return;
      hint.textContent = message;
    }
    async function handleInstallClick() {
      const btn = document.getElementById('installAppBtn');
      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        const choice = await deferredInstallPrompt.userChoice.catch(() => null);
        deferredInstallPrompt = null;
        if (choice && choice.outcome === 'accepted') {
          setInstallHint('Installed. You can launch it from your home screen.');
          if (btn) btn.style.display = 'none';
        } else {
          setInstallHint('Install dismissed. You can try again.');
        }
        return;
      }
      if (isStandaloneMode()) {
        setInstallHint('Already installed on this device.');
        return;
      }
      if (isIOS()) {
        setInstallHint('On iPhone: Share -> Add to Home Screen.');
        return;
      }
      if (!window.isSecureContext && !/^(localhost|127\.0\.0\.1)$/i.test(location.hostname)) {
        setInstallHint('For full offline install use HTTPS. LAN HTTP can still use browser Add to Home screen shortcut.');
        return;
      }
      setInstallHint('Use browser menu -> Install app / Add to Home screen.');
    }

    function renderLauncher(foundApps) {
      const html = Object.entries(foundApps)
        .filter(([_, category]) => category.found.length > 0)
        .map(([categoryKey, category], index) => `
          <div class="category ${index === 0 ? 'open' : ''}" data-category="${categoryKey}">
            <div class="category-header" onclick="toggleCategory('${categoryKey}')">
              <div class="category-title">
                <span class="category-icon">${category.icon}</span>
                <span>${category.title.split(' ').slice(1).join(' ')}</span>
                <span class="category-count">${category.found.length}</span>
              </div>
              <span class="chevron">▼</span>
            </div>
            <div class="apps-list">
              ${category.found.map(app => `
                <a href="${toAppHref(app)}" class="app-item" data-app-key="${app.key}" data-category-key="${categoryKey}">
                  <div class="app-info">
                    <div class="app-icon" data-app-key="${app.key}">${app.icon}</div>
                    <div>
                      <div class="app-name">${app.name}</div>
                      <div class="app-desc">${app.desc}</div>
                    </div>
                  </div>
                  ${app.demo ? '<span class="badge demo">DEMO</span>' : 
                    app.free ? '<span class="badge free">FREE</span>' : 
                    '<span class="badge full">FULL</span>'}
                </a>
              `).join('')}
            </div>
          </div>
        `).join('');
      
      document.getElementById('content').innerHTML = html;
    }
    function toAppHref(app) {
      const raw = app.path || (app.key + '/index.html');
      if (/^https?:\/\//i.test(raw)) return raw;
      const abs = raw.startsWith('/') ? raw : ('/' + raw);
      const url = new URL(abs, window.location.origin);
      url.searchParams.set('v', APP_NAV_VERSION);
      return url.pathname + url.search;
    }

    function toggleCategory(categoryKey) {
      const category = document.querySelector(`[data-category="${categoryKey}"]`);
      category.classList.toggle('open');
    }

    function init() {
      const foundApps = scanApps();
      cachedApps = foundApps;
      renderHelp(foundApps);
      const totalApps = countApps(foundApps);
      
      if (totalApps === 0) {
        document.getElementById('content').innerHTML = `
          <div style="text-align: center; padding: 60px 20px;">
            <h2 style="color: #ef4444; margin-bottom: 16px;">No Apps Found</h2>
            <p style="color: #94a3b8;">Make sure app folders are in the same directory as this file.</p>
            <p style="color: #64748b; margin-top: 12px; font-size: 0.9em;">Expected structure: ./app-name/index.html</p>
          </div>
        `;
      } else if (totalApps === 1) {
        const singleApp = Object.values(foundApps)
          .find(cat => cat.found.length > 0).found[0];
        
        document.getElementById('content').innerHTML = `
          <div class="loading">
            <div class="spinner"></div>
            <p>Opening ${singleApp.name}...</p>
          </div>
        `;
        
        setTimeout(() => {
          window.location.href = toAppHref(singleApp);
        }, 500);
      } else {
        renderLauncher(foundApps);
      }
      document.getElementById('openHelpBtn').addEventListener('click', openHelp);
      const installBtn = document.getElementById('installAppBtn');
      if (installBtn) {
        installBtn.addEventListener('click', handleInstallClick);
      }
      if (isStandaloneMode()) {
        if (installBtn) installBtn.style.display = 'none';
      } else {
        setInstallHint('Tip: use Install for app icon on your phone.');
      }
      document.getElementById('closeHelpBtn').addEventListener('click', closeHelp);
      document.getElementById('helpOverlay').addEventListener('click', e => {
        if (e.target.id === 'helpOverlay') closeHelp();
      });
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredInstallPrompt = e;
        setInstallHint('Ready: tap Install to add app icon.');
      });
      window.addEventListener('appinstalled', () => {
        setInstallHint('Installed successfully.');
        if (installBtn) installBtn.style.display = 'none';
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'F1') {
          e.preventDefault();
          if (!cachedApps) return;
          openHelp();
        }
        if (e.key === 'Escape') closeHelp();
      });
      const params = new URLSearchParams(window.location.search);
      if (params.get('help') === '1') openHelp();
    }

    init();
  </script>
</body>
</html>
